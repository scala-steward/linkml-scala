name: Build & test

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-ci-pr-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            java: 17
          - os: blacksmith-4vcpu-ubuntu-2404
            java: 25
      fail-fast: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache dependencies
        uses: coursier/cache-action@v8

      - name: Setup JVM and Mill
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:${{ matrix.java }}
          apps: mill

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup uv/python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: true

      - name: Install LinkML-py and generate cross-test models
        run: |
          uv pip install linkml
          python cross_test.py 

      - name: Build and test
        run: |
          ./mill --no-server -j 0 __.test

      - name: Re-generate the metamodel and check if it's unchanged
        run: |
          cp -r metamodel/ metamodel_prev/
          ./mill metamodel.regenerate
          diff -r metamodel metamodel_prev
