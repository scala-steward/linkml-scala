name: Code checks

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-ci-pr-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scalafmt-lint:
    name: Scalafmt lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Cache dependencies
        uses: coursier/cache-action@v8

      - name: Run scalafmt
        run: ./mill --no-server __.jvm.checkFormat


  ui-check:
    name: UI typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Cache dependencies
        uses: coursier/cache-action@v8

      - name: Setup JVM and Mill
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:17
          apps: mill

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Regenerate UI LinkML types and check they are committed
        run: |
          ./mill --no-server uiTypes
          git diff --exit-code -- ui/linkml.d.ts \
            || (echo "ui/linkml.d.ts is stale – run ./mill uiTypes and commit the result"; exit 1)

      - name: Type-check and bundle the UI
        run: ./mill --no-server uiCheck

  scalafix-lint:
    name: Scalafix lint
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Cache dependencies
        uses: coursier/cache-action@v8

      - name: Run scalafix
        run: ./mill --no-server __.jvm.fix --check

  git-lint:
    name: Git lint
    runs-on: ubuntu-slim
    defaults:
      run:
        shell: bash
    steps:
      # Searches the code for the issue tag, so we don't have stranded issue tags
      # Given a branch name like `LNK-1/make-the-repo`, this job will fail
      # if there is a `TODO LNK-1` somewhere in the code
      #
      # This has to assume that the branch name is either the issue tag like `LNK-1/issue-slug`
      # Or a personal/hotfix branch like `kacper/some-fix` or `hotfix/for-parsing`
      # Also allows bare branch names like `LNK-1`.
      - name: Ensure correct branch name and search for the issue tag
        run: |
          ID=$(echo $GITHUB_HEAD_REF | cut -f 1 -d "/")
          echo $ID | grep -E "^([A-Z]+-[0-9]+)|([a-z0-9]+)$" \
            || (echo "Bad branch name: $ID"; false) \
            && ! grep -r --exclude-dir ".*" --exclude-dir out "$ID"