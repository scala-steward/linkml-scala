name: Publish release
on:
  push:
    tags:
      - 'v*' # Triggers on tags starting with 'v', like v1.0.0 or v2.1.3-rc1

jobs:
  jar-assemble:
    # Separate workflow to speed up library publishing
    name: Assemble and upload library/cli JARs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required so Mill can see the full Git history and tags

      - name: Cache Dependencies
        uses: coursier/cache-action@v8

      - name: Setup JVM and Mill
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:17 # The minimal JDK version for Scala Next
          apps: mill

      - name: Assembly Uber-JAR
        run: |
          ./mill cli.jvm.assembly
          mv out/cli/jvm/assembly.dest/*.jar linkml-scala.jar

      - name: Upload Uber-JAR
        uses: actions/upload-artifact@v7
        with:
          name: linkml-scala-assembly
          path: linkml-scala.jar

  aot-compile:
    name: AOT compile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, ubuntu-22.04, ubuntu-22.04-arm, windows-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Cache Dependencies
        uses: coursier/cache-action@v8

      - name: Setup JVM and Mill
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:17 # The minimal JDK version for Scala Next

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1 # Required by GraalVM Native Image on Windows to find cl.exe

      - name: Build Native Executable with Mill
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./mill.bat cli.jvm.nativeImage
          else
            ./mill cli.jvm.nativeImage
          fi

      - name: Smoke Tests for Executable
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            BIN_PATH="./out/cli/jvm/nativeImage.dest/linkml-scala.exe"
          else
            BIN_PATH="./out/cli/jvm/nativeImage.dest/linkml-scala"
          fi
          OUTPUT=$($BIN_PATH validate tests/resources/models/basic/model.yaml)
          echo "$OUTPUT"
          if ! echo "$OUTPUT" | grep -Fq "Schema is valid."; then
            echo "Error: Expected success message not found."
            exit 1 # Forces the GitHub Action step to fail
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v7
        with:
          name: linkml-scala-${{ matrix.os }}
          path: out/cli/jvm/nativeImage.dest/*

  publish:
    name: Publish to Maven and GitHub
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - aot-compile
      - jar-assemble

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required so Mill can see the full Git history and tags

      - name: Download Binaries
        uses: actions/download-artifact@v8
        with:
          pattern: linkml-scala-*
          path: bin
          
      - name: Rename Binaries
        run: |
          mv bin/linkml-scala-assembly/linkml-scala.jar linkml-scala.jar
          mv bin/linkml-scala-macos-14/linkml-scala linkml-scala-macos-arm64
          mv bin/linkml-scala-ubuntu-22.04/linkml-scala linkml-scala-linux-x86_64
          mv bin/linkml-scala-ubuntu-22.04-arm/linkml-scala linkml-scala-linux-arm64
          mv bin/linkml-scala-windows-latest/linkml-scala.exe linkml-scala-windows-x86_64.exe
          chmod +x linkml-scala-macos-arm64
          chmod +x linkml-scala-linux-x86_64
          chmod +x linkml-scala-linux-arm64

      - name: Create Gzipped Versions
        run: |
          gzip -9 -k linkml-scala-macos-arm64 &
          gzip -9 -k linkml-scala-linux-x86_64 &
          gzip -9 -k linkml-scala-linux-arm64 &
          gzip -9 -k linkml-scala-windows-x86_64.exe &
          wait

      - name: Upload Binaries
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: "${{ github.ref_name }}"
          name: "${{ github.ref_name }}"
          artifacts: linkml-scala*
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true

      - name: Publish to Maven Central
        env:
          MILL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MILL_PGP_SECRET_BASE64: ${{ secrets.MILL_PGP_SECRET_BASE64 }}
          MILL_PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: ./mill mill.javalib.SonatypeCentralPublishModule/

  npm-publish:
    # Independent of the JVM/native jobs: publishes the Scala.js library to npm.
    # Uses npm trusted publishing (OIDC).
    name: Publish JS library to npm
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing (OIDC)
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required so Mill can derive the version from Git tags

      - name: Cache Dependencies
        uses: coursier/cache-action@v8

      - name: Setup JVM and Mill
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:25
          apps: mill

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24 # >= 22.14.0 required by trusted publishing

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # Trusted publishing needs npm >= 11.5.1

      - name: Assemble npm package
        run: ./mill generator.js.npmPackage

      - name: Verify npm package (examples run + types compile)
        run: ./mill generator.js.verifyPackage

      - name: Publish to npm
        working-directory: out/generator/js/npmPackage.dest
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *SNAPSHOT* ]]; then TAG=next; else TAG=latest; fi
          echo "Publishing @neverblink/linkml@$VERSION under dist-tag $TAG"
          npm publish --tag "$TAG"
