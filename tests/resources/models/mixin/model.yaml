id: https://neverblink.eu/linkml/tests/mixin/
name: mixin

instantiates:
  - https://neverblink.eu/linkml/tests/Metadata
extensions:
  derived_equals: basic

imports:
  - linkml:types

classes:
  SomeOtherClass:
    mixin: true
    slots:
      - some_other_slot
  SomeClass:
    tree_root: true
    mixins:
      - SomeOtherClass
    slots:
      - some_slot

slots:
  some_slot:
    range: string
  some_other_slot:
    range: integer
    required: true