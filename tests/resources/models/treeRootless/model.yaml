id: https://neverblink.eu/linkml/tests/treeRootless/
name: treeRootless
comments:
  - This model does not have a tree_root class defined, so it can be used for testing tree_root overrides
prefixes:
  linkml: https://w3id.org/linkml/

default_curi_maps:
  - semweb_context

instantiates:
  - https://neverblink.eu/linkml/tests/Metadata
extensions:
  opt_in: true

imports:
  - linkml:types

classes:
  SomeOtherClass:
    slots:
      - some_slot
  SomeClass:
    slots:
      - some_slot
      - some_other_slot
slots:
  some_slot:
    range: string
  some_other_slot:
    range: integer
    required: true