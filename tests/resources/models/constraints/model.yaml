id: https://neverblink.eu/linkml/tests/constraints/
name: constraints
imports:
  - linkml:types

classes:
  Typed:
    tree_root: true
    slots:
      - intSlot
      - floatSlot
      - stringSlot

slots:
  intSlot:
    range: integer
    minimum_value: -1
    maximum_value: 1
  floatSlot:
    range: float
    minimum_value: -2.0
    maximum_value: 2.0
  stringSlot:
    range: string
    pattern: "^([0-9]{3})?[0-9]{3}-[0-9]{4}$"
