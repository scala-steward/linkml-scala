id: https://neverblink.eu/linkml/tests/inheritance/
name: inheritance

instantiates:
  - https://neverblink.eu/linkml/tests/Metadata
extensions:
  derived_equals: basic

imports:
  - linkml:types

classes:
  BaseClass:
    slots:
      - some_other_slot
  ChildClass:
    tree_root: true
    is_a: BaseClass
    slots:
      - some_slot
slots:
  some_slot:
    range: string
  some_other_slot:
    range: integer
    required: true