id: https://neverblink.eu/linkml/tests/implicitInline/
name: implicitInline

instantiates:
  - https://neverblink.eu/linkml/tests/Metadata
extensions:
  derived_equals: inlines/explicitInline

imports:
  - linkml:types

classes:
  SomeOtherClass:
    slots:
      - some_other_slot
  SomeClass:
    tree_root: true
    slots:
      - some_slot
slots:
  some_slot:
    range: SomeOtherClass
  some_other_slot:
    range: integer
    required: true