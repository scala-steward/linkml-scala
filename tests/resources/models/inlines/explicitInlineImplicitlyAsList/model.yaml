id: https://neverblink.eu/linkml/tests/explicitInlineImplicitlyAsList/
name: explicitInlineImplicitlyAsList

imports:
  - linkml:types

classes:
  SomeOtherClass:
    attributes:
      other_slot:
        range: string
  SomeClass:
    tree_root: true
    slots:
      - some_slot
slots:
  some_slot:
    range: SomeOtherClass
    multivalued: true
    inlined: true