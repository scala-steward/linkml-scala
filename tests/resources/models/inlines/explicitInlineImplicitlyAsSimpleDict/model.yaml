id: https://neverblink.eu/linkml/tests/explicitInlineImplicitlyAsSimpleDict/
name: explicitInlineImplicitlyAsSimpleDict

imports:
  - linkml:types

classes:
  SomeOtherClass:
    attributes:
      id:
        identifier: true
        range: string
      other_slot:
        range: string
  SomeClass:
    tree_root: true
    slots:
      - some_slot
slots:
  some_slot:
    range: SomeOtherClass
    multivalued: true
    inlined: true