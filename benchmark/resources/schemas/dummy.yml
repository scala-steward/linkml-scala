id: https://neverblink.eu/linkml/benchmark/library
name: library
title: Dummy Library Schema
description: >-
  A small, self-contained LinkML schema used by the code-generator benchmarks.
default_prefix: lib
imports:
  - linkml:types
prefixes:
  lib: https://neverblink.eu/linkml/benchmark/library/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/

classes:
  Entity:
    abstract: true
    description: Base class for everything with an identifier.
    slots:
      - id
      - name

  Library:
    tree_root: true
    is_a: Entity
    description: A collection of books and the people who use them.
    slots:
      - books
      - members

  Book:
    is_a: Entity
    description: A single catalogued book.
    slots:
      - isbn
      - pageCount
      - genre
      - authors
      - available

  Person:
    is_a: Entity
    description: A human associated with the library.
    slots:
      - email
      - age

  Author:
    is_a: Person
    description: The writer of one or more books.
    slots:
      - biography

  Member:
    is_a: Person
    description: A registered borrower.
    slots:
      - membershipId
      - borrowed

slots:
  id:
    identifier: true
    range: string
    required: true
  name:
    range: string
    required: true
  isbn:
    range: string
    required: true
    pattern: "^[0-9-]{10,17}$"
  pageCount:
    range: integer
    minimum_value: 1
  genre:
    range: Genre
  authors:
    range: Author
    multivalued: true
    inlined_as_list: true
  available:
    range: boolean
  email:
    range: string
    pattern: "^\\S+@\\S+$"
  age:
    range: integer
    minimum_value: 0
    maximum_value: 150
  biography:
    range: string
  membershipId:
    range: string
    required: true
  borrowed:
    range: Book
    multivalued: true
  books:
    range: Book
    multivalued: true
    inlined_as_list: true
  members:
    range: Member
    multivalued: true
    inlined_as_list: true

enums:
  Genre:
    description: High-level category of a book.
    permissible_values:
      FICTION:
        description: Made-up stories.
      NON_FICTION:
        description: Factual works.
      POETRY:
      REFERENCE:
